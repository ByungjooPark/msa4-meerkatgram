spring:
  application:
    name: msa4-meerkatgram

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  # DB
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  error:
    include-stacktrace: never
    include-message: never

# MyBatis
mybatis:
  mapper-locations: classpath:mapper/**/*Mapper.xml
  type-aliases-package: com.msa4meerkatgram

# Log
logging:
  file:
    # 로그 파일 경로
    name: logs/error.log
  level:
    # 로그 출력 레벨 설정 (trace, debug, info, warn, error)
    root: info

    # 특정 패키지만 로그 출력 레벨 설정
    com.msa4spring.controllers: debug

# Security & JWT
security:
  jwt:
    secure: false
    issuer: meerkat@meerkat.kr
    type: JWT
    access-token-expiry: 100000000
    refresh-token-expiry: 1296000000
    refresh-token-cookie-name: refresh-token
    refresh-token-cookie-expiry: 1296000
    secret: ${JWT_SECRET}
    header-key: Authorization
    scheme: Bearer
    reiss-uri: /api/reissue-token

# file
file:
  server-uri: ${SERVER_URI:http://localhost:8080}
  storage-path: /data/storage
  profile-path: /files/profiles
  post-path: /files/posts
  allow-extension-list: [
    "image/jpg",
    "image/jpeg",
    "image/png",
    "image/gif",
    "image/svg",
    "image/webp"
  ]

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  max-age: 3600